# Docker Compose configuration for local production testing
version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: psl_db
      POSTGRES_USER: psl_user
      POSTGRES_PASSWORD: change_me_in_production
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U psl_user -d psl_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql://psl_user:change_me_in_production@postgres:5432/psl_db
      JWT_SECRET_KEY: change_me_in_production
      CORS_ORIGINS: http://localhost:3000
      PORT: 8000
      MODEL_STORAGE_PATH: /data/models
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - model_data:/data/models
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
  model_data:
